<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xynova - Home</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-left">
            <h2 class="brand-logo">Xynova</h2>
            <a href="#">Games</a>
            <a href="#">Catalog</a>
            <a href="#">Create</a>
            <a href="#">Donate</a>
        </div>
        <div class="nav-center">
            <input type="text" placeholder="Search" class="search-bar">
        </div>
        <div class="nav-right">
            <span id="nav-username" style="margin-right: 15px; font-weight: bold;">User: 13+</span>
            <span class="currency">💰 257</span>
            <span class="currency">💎 530</span>
            <span class="settings-icon">⚙️</span>
        </div>
    </nav>
    <div class="orange-strip"></div>

    <div class="page-layout">
        
        <aside class="sidebar">
            <div class="sidebar-user">
                <img src="icons/icon.png" alt="Avatar" id="mini-avatar" class="mini-avatar">
                <span id="mini-username">User</span>
            </div>

            <nav class="sidebar-menu">
                <a href="#" class="sidebar-link"><span>🏠</span> Home</a>
                <a href="#" class="sidebar-link"><span>👤</span> Profile</a>
                <a href="#" class="sidebar-link"><span>💬</span> Messages</a>
                <a href="#" class="sidebar-link"><span>👥</span> Friends <span class="badge">12</span></a>
                <a href="#" class="sidebar-link"><span>✏️</span> Avatar</a>
                <a href="#" class="sidebar-link"><span>🎒</span> Inventory</a>
                <a href="#" class="sidebar-link"><span>⇄</span> Trade</a>
                <a href="#" class="sidebar-link"><span>🏢</span> Groups</a>
                <a href="#" class="sidebar-link"><span>🗨️</span> Forums</a>
                <a href="#" class="sidebar-link"><span>📥</span> Download</a>
                
                <a href="#" id="admin-btn" class="sidebar-link admin-link" style="display: none; margin-top: 25px;">
                    <span>🔨</span> Admin
                </a>
            </nav>

            <button class="upgrade-btn">Upgrade Now</button>
            <button class="logout-btn" onclick="logoutUser()">Log Out</button>
        </aside>

        <main class="content-area">
            
            <div class="side-banner">
                <div class="placeholder-ad purple-ad">SIMPLY<br>WALK AROUND IT</div>
            </div>

            <div class="center-feed">
                <h1 id="dash-greeting">Hello, User!</h1>
            </div>

            <div class="side-banner right-banner">
                <div class="placeholder-ad grey-ad">The Nova Group<br>Awaits you...</div>
            </div>

        </main>
    </div>

    <script>
        window.onload = function() {
            const savedUser = localStorage.getItem("discord_username") || localStorage.getItem("active_session");
            const savedAvatar = localStorage.getItem("discord_avatar");

            if (!savedUser) {
                window.location.href = "/";
                return;
            }

            // Update text elements
            document.getElementById("dash-greeting").innerText = "Hello, " + savedUser + "!";
            document.getElementById("nav-username").innerText = savedUser + ": 13+";
            document.getElementById("mini-username").innerText = savedUser;

            if (savedAvatar) {
                document.getElementById("mini-avatar").src = savedAvatar;
            }

            // SUPER SECRET ADMIN CHECK
            const storedPassword = localStorage.getItem("user_xynova");
            if (savedUser.toLowerCase() === "xynova" && storedPassword === "xynovaofficialaccount") {
                // Change display from 'none' to 'flex' so the icon aligns correctly
                document.getElementById("admin-btn").style.display = "flex";
            }
        };

        function logoutUser() {
            localStorage.clear();
            window.location.href = "/";
        }
    </script>
</body>
</html>
