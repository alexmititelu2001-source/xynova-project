<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xynova - Home</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-left">
            <h2 class="brand-logo">Xynova</h2>
            <a href="#">Games</a>
            <a href="#">Catalog</a>
            <a href="#">Create</a>
            <a href="#">Donate</a>
        </div>
        
        <div class="nav-center">
            <div class="search-container">
                <input type="text" id="main-search-input" placeholder="Search" class="search-bar" autocomplete="off">
                <img src="icons/icon.png" alt="Search Icon" class="search-bar-lens">
                
                <div id="search-dropdown-overlay" class="search-dropdown">
                    <a href="#" class="search-dropdown-item">Search "<span class="search-term-fill"></span>" in Catalog</a>
                    <a href="#" class="search-dropdown-item">Search "<span class="search-term-fill"></span>" in People</a>
                    <a href="#" class="search-dropdown-item">Search "<span class="search-term-fill"></span>" in Games</a>
                    <a href="#" class="search-dropdown-item">Search "<span class="search-term-fill"></span>" in Groups</a>
                    <a href="#" class="search-dropdown-item">Search "<span class="search-term-fill"></span>" in Library</a>
                </div>
            </div>
        </div>
        
        <div class="nav-right">
            <span id="nav-username" style="margin-right: 15px; font-weight: bold;">User: 13+</span>
            
            <span class="currency">
                <img src="icons/robux.png" alt="Robux" class="nav-currency-icon"> 0
            </span>
            
            <span class="currency">
                <img src="icons/tix.png" alt="Tix" class="nav-currency-icon"> 0
            </span>
            
            <span class="currency">
                <img src="icons/settings.png" alt="Settings" class="nav-settings-icon">
            </span>
        </div>
    </nav>
    <div class="orange-strip"></div>

    <div class="page-layout">
        
        <aside class="sidebar">
            
            <div class="sidebar-logo-area">
                <img src="icons/icon.png" alt="Xynova Logo" class="sidebar-main-logo">
                <span class="sidebar-brand-text">Xynova</span>
            </div>

            <div class="sidebar-menu-wrapper">
                <img src="sidebarnobackground.png" alt="Main Menu" class="sidebar-img-main">
                
                <div class="invisible-overlay-grid">
                    <a href="#" class="invisible-btn" title="Home"></a>
                    <a href="#" class="invisible-btn" title="Profile"></a>
                    <a href="#" class="invisible-btn" title="Messages"></a>
                    <a href="#" class="invisible-btn" title="Friends"></a>
                    <a href="#" class="invisible-btn" title="Avatar"></a>
                    <a href="#" class="invisible-btn" title="Inventory"></a>
                    <a href="#" class="invisible-btn" title="Trade"></a>
                    <a href="#" class="invisible-btn" title="Groups"></a>
                    <a href="#" class="invisible-btn" title="Forums"></a>
                    <a href="#" class="invisible-btn" title="Download"></a>
                </div>
            </div>
            
            <div id="admin-section" class="sidebar-admin-wrapper" style="display: none;">
                <img src="adminside.png" alt="Admin Menu" class="sidebar-img-admin">
                <a href="#" class="invisible-admin-btn" title="Admin"></a>
            </div>

            <button class="upgrade-btn">Upgrade Now</button>
            <button class="logout-btn" onclick="logoutUser()">Log Out</button>
        </aside>

        <main class="content-area">
            
            <div class="side-banner">
                <div class="placeholder-ad purple-ad">SIMPLY<br>WALK AROUND IT</div>
            </div>

            <div class="center-feed">
                <h1 id="dash-greeting">Hello, User!</h1>
            </div>

            <div class="side-banner right-banner">
                <div class="placeholder-ad grey-ad">The Nova Group<br>Awaits you...</div>
            </div>

        </main>
    </div>

    <script>
        window.onload = function() {
            const savedUser = localStorage.getItem("discord_username") || localStorage.getItem("active_session");

            if (!savedUser) {
                window.location.href = "/";
                return;
            }

            document.getElementById("dash-greeting").innerText = "Hello, " + savedUser + "!";
            document.getElementById("nav-username").innerText = savedUser + ": 13+";

            const storedPassword = localStorage.getItem("user_xynova");
            if (savedUser.toLowerCase() === "xynova" && storedPassword === "xynovaofficialaccount") {
                document.getElementById("admin-section").style.display = "block";
            }
        };

        // Live Typing Core Search Dropdown Mechanics
        const searchInput = document.getElementById("main-search-input");
        const searchDropdown = document.getElementById("search-dropdown-overlay");
        const textSpans = document.querySelectorAll(".search-term-fill");

        searchInput.addEventListener("input", function() {
            const currentVal = searchInput.value;
            
            if (currentVal.trim().length > 0) {
                // Populate all query variations inside dropdown entries
                textSpans.forEach(span => {
                    span.innerText = currentVal;
                });
                searchDropdown.classList.add("visible");
            } else {
                searchDropdown.classList.remove("visible");
            }
        });

        // Close dropdown menu automatically if click occurs outside layout container
        document.addEventListener("click", function(event) {
            if (!event.target.closest(".search-container")) {
                searchDropdown.classList.remove("visible");
            }
        });

        function logoutUser() {
            localStorage.clear();
            window.location.href = "/";
        }
    </script>
</body>
</html>
