<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xynova - Home</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-left">
            <h2 class="brand-logo">Xynova</h2>
            <a href="#">Games</a>
            <a href="#">Catalog</a>
            <a href="#">Create</a>
            <a href="#">Donate</a>
        </div>
        <div class="nav-center">
            <input type="text" placeholder="Search" class="search-bar">
        </div>
        <div class="nav-right">
            <span id="nav-username" style="margin-right: 15px; font-weight: bold;">User: 13+</span>
            <span class="currency">💰 0</span>
            <span class="currency">💎 0</span>
            <span class="settings-icon">⚙️</span>
        </div>
    </nav>
    <div class="orange-strip"></div>

    <div class="page-layout">
        
        <aside class="sidebar">
            
            <div class="sidebar-logo-area">
                <img src="icons/icon.png" alt="Xynova" class="sidebar-main-logo">
                <span class="sidebar-brand-text">Xynova</span>
            </div>

            <nav class="sidebar-menu">
                <a href="#" class="sidebar-btn"><span>🏠</span> Home</a>
                <a href="#" class="sidebar-btn"><span>👤</span> Profile</a>
                <a href="#" class="sidebar-btn"><span>💬</span> Messages</a>
                <a href="#" class="sidebar-btn"><span>👥</span> Friends <span class="badge">12</span></a>
                <a href="#" class="sidebar-btn"><span>✏️</span> Avatar</a>
                <a href="#" class="sidebar-btn"><span>🎒</span> Inventory</a>
                <a href="#" class="sidebar-btn"><span>⇄</span> Trade</a>
                <a href="#" class="sidebar-btn"><span>🏢</span> Groups</a>
                <a href="#" class="sidebar-btn"><span>🗨️</span> Forums</a>
                <a href="#" class="sidebar-btn"><span>📥</span> Download</a>
                
                <a href="#" id="admin-btn" class="sidebar-btn admin-link" style="display: none; margin-top: 25px;">
                    <span>🔨</span> Admin
                </a>
            </nav>

            <button class="upgrade-btn">Upgrade Now</button>
            <button class="logout-btn" onclick="logoutUser()">Log Out</button>
        </aside>

        <main class="content-area">
            
            <div class="side-banner">
                <div class="placeholder-ad purple-ad">SIMPLY<br>WALK AROUND IT</div>
            </div>

            <div class="center-feed">
                <h1 id="dash-greeting">Hello, User!</h1>
            </div>

            <div class="side-banner right-banner">
                <div class="placeholder-ad grey-ad">The Nova Group<br>Awaits you...</div>
            </div>

        </main>
    </div>

    <script>
        window.onload = function() {
            const savedUser = localStorage.getItem("discord_username") || localStorage.getItem("active_session");

            if (!savedUser) {
                window.location.href = "/";
                return;
            }

            // Update text elements
            document.getElementById("dash-greeting").innerText = "Hello, " + savedUser + "!";
            document.getElementById("nav-username").innerText = savedUser + ": 13+";

            // SUPER SECRET ADMIN CHECK
            const storedPassword = localStorage.getItem("user_xynova");
            if (savedUser.toLowerCase() === "xynova" && storedPassword === "xynovaofficialaccount") {
                document.getElementById("admin-btn").style.display = "flex";
            }
        };

        function logoutUser() {
            localStorage.clear();
            window.location.href = "/";
        }
    </script>
</body>
</html>
