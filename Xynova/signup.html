<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xynova Sign Up</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }

        .signup-page {
            background-color: #0077be;
            background-image: url('icon.png');
            background-repeat: repeat;
            background-size: 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header { 
            display: flex; padding: 15px 30px; 
            background: rgba(0,0,0,0.2); 
            color: white; 
            align-items: center; 
            justify-content: space-between; 
        }
        .header-left img { width: 32px; height: 32px; }

        .nav-right button { 
            background: none; border: 1px solid white; color: white; 
            padding: 6px 16px; cursor: pointer; margin-left: 10px; font-weight: bold;
        }

        .main-content {
            display: flex; justify-content: center; align-items: center;
            flex-grow: 1; gap: 100px; color: white; padding: 20px;
        }

        .brand-area h1 { font-size: 56px; margin: 0; }
        .brand-area p { font-size: 20px; opacity: 0.9; }

        .signup-box {
            background: #f2f2f2; padding: 35px; border-radius: 4px;
            color: #333; width: 380px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .signup-box input { padding: 12px; border: 1px solid #ccc; border-radius: 2px; }
        .discord-btn { background: #7289da; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; }
        .submit-btn { background: #a34b2a; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; }
        .footer-links { display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; color: #555; }
    </style>
</head>
<body>
    <div class="signup-page">
        <header class="header">
            <div class="header-left">
                <img src="icon.png" alt="Logo">
            </div>
            <div class="nav-right">
                <button>Support</button>
                <button>Log In</button>
            </div>
        </header>

        <main class="main-content">
            <div class="brand-area">
                <h1>Xynova</h1>
                <p>Repowering Imagination™</p>
            </div>

            <div class="signup-box">
                <h2>SIGN UP NOW</h2>
                <button class="discord-btn">Verify with Discord</button>
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <input type="password" placeholder="Confirm Password">
                <button class="submit-btn">Sign Up</button>
                <div class="footer-links">
                    <span>Already have an account? Login!</span>
                    <span>Forgot password?</span>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
